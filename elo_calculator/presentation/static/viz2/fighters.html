<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fighters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
      :root { --bg: #0b0e13; --card: #141a22; --text: #e5eef8; --muted: #9fb3c8; --accent: #3ba3ff; }
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
      header { padding: 20px 24px; border-bottom: 1px solid #1f2937; }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .row { display: flex; gap: 12px; align-items: center; }
      input[type="text"] { background: #0d1218; color: var(--text); border: 1px solid #1f2937; border-radius: 8px; padding: 10px 12px; width: 320px; }
      button { background: var(--accent); color: white; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
      .list { margin-top: 16px; }
      .item { background: var(--card); border: 1px solid #1f2937; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
      .link { color: var(--accent); text-decoration: none; font-weight: 600; }
      small { color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="topNavHost"></div>
    <div class="container">
      <div class="card" style="margin-bottom:16px; padding:12px;">
        <div class="row">
          <a href="/viz/index.html" class="link" style="margin-right: auto">← Back to dashboard</a>
          <input id="q" type="text" placeholder="Search fighters by name" />
          <button id="searchBtn">Search</button>
        </div>
      </div>
      <div class="row" style="gap:16px; margin-bottom:12px;">
        <label>Sort by
          <select id="sortBy">
            <option value="name">Name</option>
            <option value="current_elo">Current ELO</option>
            <option value="peak_elo">Peak ELO</option>
          </select>
        </label>
        <label>Order
          <select id="order">
            <option value="asc">Ascending</option>
            <option value="desc" selected>Descending</option>
          </select>
        </label>
        <label>Page size
          <select id="pageSize">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
        </label>
      </div>
      <div id="results" class="list"></div>
      <div class="row" style="justify-content: space-between; margin-top: 8px;">
        <button id="prevBtn">Prev</button>
        <small id="pageInfo"></small>
        <button id="nextBtn">Next</button>
      </div>
      <small style="color:var(--muted); display:block; margin-top:6px;">Browse fighters and sort by name, current ELO, or peak ELO. Pagination controls navigate the full list.</small>
    </div>
    <script src="./app.js"></script>
    <script src="./nav.js"></script>
    <script src="./fighters.js"></script>
  </body>
</html>
