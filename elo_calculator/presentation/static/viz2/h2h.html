<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Head-to-Head — UFC ELO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
      :root { --bg: #0b0e13; --card: #141a22; --text: #e5eef8; --muted: #9fb3c8; --accent: #3ba3ff; }
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
      .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
      .card { background: var(--card); border: 1px solid #1f2937; border-radius: 12px; padding: 16px; box-shadow: 0 1px 12px rgba(0,0,0,0.2); }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      input, select { background: #0d1218; color: var(--text); border: 1px solid #1f2937; border-radius: 8px; padding: 10px 12px; }
      button { background: var(--accent); color: white; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
      .card { position: relative; }
      .loader-overlay { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; background: rgba(11,14,19,0.6); backdrop-filter: blur(3px); z-index: 5; }
      .loader { display:inline-flex; align-items:center; gap:10px; color: var(--muted); font-weight: 600; }
      .spinner { width: 18px; height: 18px; border: 3px solid #1f2937; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .result { display:grid; grid-template-columns: 1fr 80px 1fr; gap:20px 28px; align-items:stretch; }
      .panel { background:#0d1218; border:1px solid #1f2937; border-radius:8px; padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
      .big { font-size: 30px; font-weight: 800; }
      .vs { display:flex; align-items:center; justify-content:center; font-weight:800; color:#9fb3c8; font-size:22px; }
      .muted { color: var(--muted); }
      a.link-muted, a.link-muted:visited, a.link-muted:active { color: var(--text); text-decoration: none; border-bottom: 1px dashed transparent; }
      a.link-muted:hover { color: var(--accent); border-bottom-color: var(--accent); text-decoration: none; }
      /* Autocomplete */
      .ac-list { position:fixed; z-index:1000; left:0; top:0; width:0; background:#0d1218; border:1px solid #1f2937; border-top:none; max-height:240px; overflow:auto; border-radius:0 0 8px 8px; display:none; }
      .ac-item { padding:8px 10px; cursor:pointer; color:var(--text); }
      .ac-item:hover { background:#111827; }
      .form-grid { display:grid; grid-template-columns: 1fr 1fr auto; column-gap: 28px; row-gap: 12px; align-items:end; }
      @media(max-width: 820px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="topNavHost"></div>
    <div class="container">
      <div class="card">
        <h1>Head-to-Head Probability</h1>
        <div class="row" style="margin-bottom:12px;">
          <a href="/viz/index.html" style="text-decoration:none;"><button style="background:#374151">← Back</button></a>
        </div>
        <div class="form-grid">
          <div>
            <label class="muted">Fighter A</label><br />
            <input id="f1Input" type="text" placeholder="Name or ID" style="width:100%" />
            <div class="row" style="gap:8px; margin-top:6px;">
              <label class="muted">Mode</label>
              <select id="f1Mode"><option value="current">Current</option><option value="peak">Prime (Peak)</option><option value="year">Year</option></select>
              <input id="f1Year" type="number" min="1900" max="2100" placeholder="Year" style="width:120px; display:none;" />
            </div>
          </div>
          <div>
            <label class="muted">Fighter B</label><br />
            <input id="f2Input" type="text" placeholder="Name or ID" style="width:100%" />
            <div class="row" style="gap:8px; margin-top:6px;">
              <label class="muted">Mode</label>
              <select id="f2Mode"><option value="current">Current</option><option value="peak">Prime (Peak)</option><option value="year">Year</option></select>
              <input id="f2Year" type="number" min="1900" max="2100" placeholder="Year" style="width:120px; display:none;" />
            </div>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <label class="muted" style="margin-right:8px; display:flex; align-items:center; gap:6px;">
              <span>Adjustment</span>
              <select id="adjMode">
                <option value="base">Base (ELO only)</option>
                <option value="window">Recency blend</option>
                <option value="nudge">Light nudge</option>
                <option value="meta">Calibrated</option>
                <option value="best">Calibrated (best blend)</option>
              </select>
            </label>
            <label class="muted" style="margin-right:8px; display:flex; align-items:center; gap:6px;">
              <input id="chkFiveRound" type="checkbox" /> 5-round
            </label>
            <label class="muted" style="margin-right:8px; display:flex; align-items:center; gap:6px;">
              <input id="chkTitle" type="checkbox" /> Title fight
            </label>
            <label class="muted" style="margin-right:8px; display:flex; align-items:center; gap:6px;"><input id="explainChk" type="checkbox" checked /> Explain</label>
            <button id="computeBtn">Compute</button>
          </div>
        </div>
        <div id="out" style="margin-top:16px;" class="result"></div>
        <div id="explainPanel" style="margin-top:12px;"></div>
        <small style="color:var(--muted); display:block; margin-top:6px;">Win probabilities come from ELO; method splits blend win tendencies and opponent loss tendencies with stats. Use modes to evaluate current, peak, or year snapshots.</small>
      </div>
    </div>
    <script src="./app.js"></script>
    <script src="./nav.js"></script>
    <script src="./h2h.js"></script>
  </body>
  </html>
