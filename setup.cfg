# Note: replacement needed
[flake8]
exclude=.venv,elo_calculator/infrastructure/database/alembic
ignore=W503, C901
max-line-length=120
max-complexity=4
pycodestyle = single_quotes


[isort]
known_third_party=alembic,fastapi,sqlalchemy
line_length=120
multi_line_output=5

[coverage:run]
branch=True
omit=
    elo_calculator/controllers/batches_controller.py
    elo_calculator/tests/*
source=/app/elo_calculator

[coverage:report]
fail_under=100
show_missing=True

[tool:pytest]
testpaths=
    /app/elo_calculator/tests
addopts= -vv

[mypy]
explicit_package_bases=True
namespace_packages=True
show_error_codes=True
strict=True
files=elo_calculator
exclude=elo_calculator/infrastructure/database/alembic
