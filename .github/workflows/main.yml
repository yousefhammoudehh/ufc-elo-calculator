---
name: Build and Deploy
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main
      - master
  release:
    types: [created]
  pull_request:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    name: build_and_deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      actions: write
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@master

      - name: Run Linting
        id: run-lint
        if: github.event_name == 'pull_request'
        run: docker compose run --rm --no-deps olive-template-lint
