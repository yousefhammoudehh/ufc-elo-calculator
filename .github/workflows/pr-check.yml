name: Lint And Check
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      actions: write
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v3

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --with dev

      - name: Run Linting
        id: run-lint
        run: |
          poetry run ruff check .
          poetry run ruff format --check .
          poetry run mypy data_catalog/

  rebase-check:
    name: Check if rebase needed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get PR information
        id: pr-info
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              state: 'open'
            });
            return prs.data.map(pr => ({
              number: pr.number,
              head: pr.head.sha
            }));

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if rebase needed for PR
        if: github.event_name == 'pull_request'
        id: rebase-check
        run: |
          git fetch origin ${{ github.base_ref }}
          MERGE_BASE=$(git merge-base HEAD "origin/${{ github.base_ref }}")
          TARGET_HEAD=$(git rev-parse "origin/${{ github.base_ref }}")

          if [ "$MERGE_BASE" = "$TARGET_HEAD" ]; then
            echo "rebase_needed=false" >> "$GITHUB_OUTPUT"
            echo "PR is up to date with target branch"
          else
            echo "rebase_needed=true" >> "$GITHUB_OUTPUT"
            echo "PR needs to be rebased"
          fi

      - name: Check Status
        if: github.event_name == 'pull_request' && steps.rebase-check.outputs.rebase_needed == 'true'
        run: exit 1
